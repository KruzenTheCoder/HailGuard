# Supabase local development config.
# Run `supabase start` to boot the local stack, then `supabase db reset`
# to apply migrations + seed.sql.
project_id = "hailguard"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "hailguard://"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Phone OTP (configure a provider's credentials via env before enabling in prod).
[auth.sms]
enable_signup = true
enable_confirmations = true

[storage]
enabled = true
file_size_limit = "50MiB"
